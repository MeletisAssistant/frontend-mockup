<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <!-- Fondo blanco -->
  <rect width="512" height="512" fill="#ffffff"/>

  <!-- Logo (hoja) centrado con márgenes; el arte original es 48x48 -->
  <g transform="translate(56 56) scale(8.33)">
    <g transform="rotate(-18 24 24)">
      <!-- Cuerpo de la hoja -->
      <path d="M6 24c0-6 6-11 16-12 8-0.8 16 1 20 3-4 2-12 3.8-20 3-10-1-16-6-16-12 0 12 8 18 18 18 7 0 13-3 16-6"
            fill="#5b8c5a"/>
      <path d="M6 24c5 4 11 6 18 6 7 0 13-3 16-6-4 2-12 3.8-20 3-10-1-16-6-16-12 0 6 6 11 16 12-10-1-16-6-18-9z"
            fill="#74a96f"/>
      <!-- Nervadura central -->
      <path d="M7 24c10 1 22 0 33-3" stroke="#3f6b40" stroke-width="1.4" stroke-linecap="round"/>
      <!-- Nervaduras laterales -->
      <path d="M16 23.6l-4-3.4M24 23.6l-4-4M32 22.8l-3.4-3.6" stroke="#3f6b40" stroke-width="1" stroke-linecap="round" opacity="0.7"/>
      <!-- Tallo -->
      <path d="M40 21c3 0 5 0.6 6 1.4" stroke="#7a5a3a" stroke-width="1.6" stroke-linecap="round"/>
    </g>
  </g>
</svg>
